services:
  database:
    image: mariadb:10.4.32
    container_name: eventflow_database
    environment:
      MYSQL_DATABASE: eventflow
      MYSQL_USER: eventflow
      MYSQL_PASSWORD: eventflow
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - database_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  php:
    build:
      context: ./backend
    container_name: eventflow_php
    depends_on:
      database:
        condition: service_healthy
    environment:
      APP_ENV: dev
      APP_SECRET: change-me-use-a-long-random-secret
      DATABASE_URL: "mysql://eventflow:eventflow@database:3306/eventflow?serverVersion=mariadb-10.4.32&charset=utf8mb4"
      CORS_ALLOW_ORIGIN: "^https?://(localhost|127\\.0\\.0\\.1)(:[0-9]+)?$"
      JWT_SECRET_KEY: "%kernel.project_dir%/config/jwt/private.pem"
      JWT_PUBLIC_KEY: "%kernel.project_dir%/config/jwt/public.pem"
      JWT_PASSPHRASE: change-me
      ORGANIZER_INVITE_CODE: eventflow-organizer
    volumes:
      - ./backend:/var/www/backend
      - backend_vendor:/var/www/backend/vendor
    command: >
      sh -c "composer install &&
      mkdir -p config/jwt &&
      php bin/console lexik:jwt:generate-keypair --skip-if-exists &&
      php bin/console doctrine:migrations:migrate --no-interaction &&
      php-fpm"

  nginx:
    image: nginx:1.27-alpine
    container_name: eventflow_nginx
    depends_on:
      - php
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/backend:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  node:
    build:
      context: ./frontend
    container_name: eventflow_node
    depends_on:
      - nginx
    environment:
      VITE_API_BASE_URL: "http://localhost:8080/api"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  database_data:
  backend_vendor:
  frontend_node_modules:
