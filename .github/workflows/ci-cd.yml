name: EventFlow CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Symfony backend
    runs-on: ubuntu-latest
    env:
      APP_ENV: test
      APP_SECRET: test-secret
      DATABASE_URL: sqlite:///%kernel.project_dir%/var/test.db
      JWT_SECRET_KEY: '%kernel.project_dir%/config/jwt/private.pem'
      JWT_PUBLIC_KEY: '%kernel.project_dir%/config/jwt/public.pem'
      JWT_PASSPHRASE: change-me
      ORGANIZER_INVITE_CODE: eventflow-organizer
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: ctype, iconv, intl, mbstring, pdo_mysql, pdo_sqlite, zip
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --no-scripts

      - name: Prepare JWT keys
        run: php bin/console lexik:jwt:generate-keypair --skip-if-exists

      - name: Lint Symfony container
        run: php bin/console lint:container

      - name: Validate Doctrine mapping
        run: php bin/console doctrine:schema:validate --skip-sync

      - name: Run PHPUnit
        run: php bin/phpunit

  frontend:
    name: Vue frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:8080/api

      - name: Upload frontend build artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: eventflow-frontend-dist
          path: frontend/dist

  docker:
    name: Docker delivery check
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose config
        run: docker compose config

      - name: Build Docker images
        run: docker compose build
